# Example Prometheus scrape config for the Cheese backend.
# Copy to your Prometheus server and adjust `targets`.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml # mount observability/prometheus/alerts.yml here

scrape_configs:
  - job_name: cheese-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000 # or your backend host:port
