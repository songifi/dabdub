name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  RUSTFLAGS: -D warnings

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: cargo test
        run: cargo test

      - name: wasm build
        run: cargo wasm-build
