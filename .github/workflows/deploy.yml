name: Deploy Soroban Contracts

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  # -----------------------------------------------------------------------
  # Build optimised WASMs and record sizes
  # -----------------------------------------------------------------------
  build-wasm:
    name: Build & optimise WASMs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dabdub_contracts
    outputs:
      wasm-artifact: wasm-contracts-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install wasm-opt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen

      - name: Build release WASMs
        run: cargo build --target wasm32v1-none --release

      - name: Optimise with wasm-opt -Oz
        run: |
          for wasm in target/wasm32v1-none/release/*.wasm; do
            echo "Optimising $wasm"
            wasm-opt -Oz --output "$wasm" "$wasm"
          done

      - name: Enforce 64 KB WASM size limit
        run: |
          LIMIT=65536
          failed=0
          for wasm in target/wasm32v1-none/release/*.wasm; do
            size=$(wc -c < "$wasm")
            if [ "$size" -gt "$LIMIT" ]; then
              echo "FAIL  $wasm  ${size}B  (limit ${LIMIT}B)"
              failed=1
            else
              echo "OK    $wasm  ${size}B"
            fi
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts-${{ github.sha }}
          path: dabdub_contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 30

  # -----------------------------------------------------------------------
  # Deploy to testnet on every merge to main
  # -----------------------------------------------------------------------
  deploy-testnet:
    name: Deploy to Testnet
    needs: build-wasm
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      admin_timelock_id: ${{ steps.deploy.outputs.admin_timelock_id }}
      merchant_registry_id: ${{ steps.deploy.outputs.merchant_registry_id }}
      payment_escrow_id: ${{ steps.deploy.outputs.payment_escrow_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download WASMs
        uses: actions/download-artifact@v4
        with:
          name: wasm-contracts-${{ github.sha }}
          path: wasm/

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --features opt

      - name: Configure testnet network
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015"

      - name: Import deploy keypair
        env:
          DEPLOY_SECRET: ${{ secrets.TESTNET_DEPLOY_SECRET }}
        run: echo "$DEPLOY_SECRET" | stellar keys add deployer --secret-key

      - name: Deploy contracts to testnet
        id: deploy
        run: |
          deploy_contract() {
            local name=$1
            local wasm=$2
            local id
            id=$(stellar contract deploy \
              --wasm "$wasm" \
              --source deployer \
              --network testnet 2>&1 | tail -1)
            echo "${name}_id=${id}" >> "$GITHUB_OUTPUT"
            echo "Deployed $name: $id"
          }

          deploy_contract admin_timelock    wasm/admin_timelock.wasm
          deploy_contract merchant_registry wasm/merchant_registry.wasm
          deploy_contract payment_escrow    wasm/payment_escrow.wasm

      - name: Summary
        run: |
          echo "### Testnet contract IDs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| admin_timelock | ${{ steps.deploy.outputs.admin_timelock_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| merchant_registry | ${{ steps.deploy.outputs.merchant_registry_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| payment_escrow | ${{ steps.deploy.outputs.payment_escrow_id }} |" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # Deploy to mainnet on version tags — requires manual approval
  # -----------------------------------------------------------------------
  deploy-mainnet:
    name: Deploy to Mainnet
    needs: build-wasm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: mainnet
      url: https://stellar.expert/explorer/public
    steps:
      - uses: actions/checkout@v4

      - name: Download WASMs
        uses: actions/download-artifact@v4
        with:
          name: wasm-contracts-${{ github.sha }}
          path: wasm/

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Configure mainnet network
        run: |
          stellar network add mainnet \
            --rpc-url https://soroban-mainnet.stellar.org \
            --network-passphrase "Public Global Stellar Network ; September 2015"

      - name: Import deploy keypair
        env:
          DEPLOY_SECRET: ${{ secrets.MAINNET_DEPLOY_SECRET }}
        run: echo "$DEPLOY_SECRET" | stellar keys add deployer --secret-key

      - name: Deploy contracts to mainnet
        id: deploy
        run: |
          deploy_contract() {
            local name=$1
            local wasm=$2
            local id
            id=$(stellar contract deploy \
              --wasm "$wasm" \
              --source deployer \
              --network mainnet 2>&1 | tail -1)
            echo "${name}_id=${id}" >> "$GITHUB_OUTPUT"
            echo "Deployed $name: $id"
          }

          deploy_contract admin_timelock    wasm/admin_timelock.wasm
          deploy_contract merchant_registry wasm/merchant_registry.wasm
          deploy_contract payment_escrow    wasm/payment_escrow.wasm

      - name: Summary
        run: |
          echo "### Mainnet contract IDs (${{ github.ref_name }})" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| admin_timelock | ${{ steps.deploy.outputs.admin_timelock_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| merchant_registry | ${{ steps.deploy.outputs.merchant_registry_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| payment_escrow | ${{ steps.deploy.outputs.payment_escrow_id }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback procedure reminder
        run: |
          echo "To rollback: redeploy the previous release WASM hash using"
          echo "  stellar contract deploy --wasm <prev-hash>.wasm --source deployer --network mainnet"
          echo "Previous WASM artifacts are retained for 30 days in GitHub Actions."
